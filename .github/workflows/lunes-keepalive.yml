name: Lunes Keepalive

on:
  schedule:
    - cron: '0 1 * * 0'        # 每周日 1:00 UTC（北京时间 9:00）
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libx11-xcb1 libxcb1 libxcb-shm0 libxcb-xfixes0 \
            libxcb-shape0 libxcb-randr0 libxcb-keysyms1 \
            libxcb-util1 libxcb-icccm4 libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libdrm2 \
            libgbm1 \
            libasound2t64 \
            libgl1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade seleniumbase requests   # 确保最新版

      - name: Run Lunes script
        env:
          LUNES_EMAIL: ${{ secrets.LUNES_EMAIL }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python lunes.py
